name: Import Android Skills

on:
  workflow_dispatch:
    inputs:
      target_path:
        description: 'Folder where Android Skills should be imported'
        required: true
        default: 'android-skills'
        type: string
      source_url:
        description: 'Android Skills ZIP URL'
        required: true
        default: 'https://dl.google.com/dac/dac_skills.zip'
        type: string

permissions:
  contents: write

concurrency:
  group: import-android-skills-main
  cancel-in-progress: false

jobs:
  import-android-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download Android Skills ZIP
        run: |
          set -euo pipefail
          curl -L "${{ inputs.source_url }}" -o android-skills.zip
          rm -rf _android_skills_import
          mkdir _android_skills_import
          unzip -q android-skills.zip -d _android_skills_import

      - name: Import files into target folder
        run: |
          set -euo pipefail
          TARGET="${{ inputs.target_path }}"
          rm -rf "$TARGET"
          mkdir -p "$TARGET"
          rsync -a _android_skills_import/ "$TARGET"/
          rm -rf _android_skills_import android-skills.zip

      - name: Commit and push changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No Android Skills changes to commit."
          else
            git commit -m "Import Android Skills"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
